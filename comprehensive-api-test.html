<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>7agty.com - Comprehensive API & Code Test</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                padding: 20px;
                min-height: 100vh;
            }
            .container {
                max-width: 1400px;
                margin: 0 auto;
                background: white;
                border-radius: 15px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                overflow: hidden;
            }
            .header {
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                color: white;
                padding: 30px;
                text-align: center;
            }
            .header h1 {
                font-size: 2.5em;
                margin-bottom: 10px;
            }
            .header p {
                font-size: 1.2em;
                opacity: 0.9;
            }
            .controls {
                padding: 20px 30px;
                background: #f8f9fa;
                border-bottom: 2px solid #dee2e6;
                display: flex;
                gap: 15px;
                flex-wrap: wrap;
                align-items: center;
            }
            .btn {
                padding: 12px 24px;
                border: none;
                border-radius: 8px;
                font-size: 1em;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                color: white;
            }
            .btn-primary {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
            .btn-success {
                background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            }
            .btn-danger {
                background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            }
            .btn-warning {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            }
            .content {
                padding: 30px;
            }
            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            .stat-card {
                padding: 20px;
                border-radius: 10px;
                text-align: center;
                color: white;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }
            .stat-card h3 {
                font-size: 2.5em;
                margin-bottom: 5px;
            }
            .stat-card p {
                font-size: 0.9em;
                opacity: 0.9;
            }
            .stat-total {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .stat-pass {
                background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            }
            .stat-fail {
                background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            }
            .stat-warn {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            }

            .section {
                margin-bottom: 30px;
            }
            .section-title {
                font-size: 1.5em;
                color: #2c3e50;
                margin-bottom: 15px;
                padding-bottom: 10px;
                border-bottom: 3px solid #667eea;
            }
            .test-item {
                background: #f8f9fa;
                border-left: 4px solid #dee2e6;
                padding: 15px;
                margin-bottom: 10px;
                border-radius: 5px;
                transition: all 0.3s;
            }
            .test-item:hover {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            .test-item.success {
                border-left-color: #38ef7d;
                background: #d4edda;
            }
            .test-item.error {
                border-left-color: #f45c43;
                background: #f8d7da;
            }
            .test-item.warning {
                border-left-color: #ffc107;
                background: #fff3cd;
            }
            .test-name {
                font-weight: 600;
                color: #2c3e50;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .badge {
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.75em;
                font-weight: 700;
                text-transform: uppercase;
            }
            .badge-success {
                background: #38ef7d;
                color: white;
            }
            .badge-error {
                background: #f45c43;
                color: white;
            }
            .badge-warning {
                background: #ffc107;
                color: #000;
            }
            .badge-info {
                background: #667eea;
                color: white;
            }

            .test-details {
                font-size: 0.9em;
                color: #495057;
                margin-top: 8px;
            }
            .code-block {
                background: #282c34;
                color: #abb2bf;
                padding: 15px;
                border-radius: 5px;
                overflow-x: auto;
                margin-top: 10px;
                font-family: "Courier New", monospace;
                font-size: 0.85em;
            }
            .error-text {
                color: #f45c43;
                font-weight: 600;
            }
            .success-text {
                color: #38ef7d;
                font-weight: 600;
            }
            .warning-text {
                color: #ffc107;
                font-weight: 600;
            }
            .loading {
                text-align: center;
                padding: 40px;
                font-size: 1.2em;
                color: #667eea;
            }
            .spinner {
                border: 4px solid #f3f3f3;
                border-top: 4px solid #667eea;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 20px auto;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            .toggle-details {
                cursor: pointer;
                color: #667eea;
                text-decoration: underline;
                font-size: 0.85em;
                margin-top: 5px;
                display: inline-block;
            }
            .details-content {
                display: none;
                margin-top: 10px;
                padding: 10px;
                background: rgba(255, 255, 255, 0.5);
                border-radius: 5px;
            }
            .details-content.show {
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🔍 7agty.com - Comprehensive Test Suite</h1>
                <p>
                    API Endpoints • Code Quality • Template Literals • URL
                    Validation
                </p>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="runAllTests()">
                    🚀 Run All Tests
                </button>
                <button class="btn btn-success" onclick="runAPITests()">
                    🔌 API Tests Only
                </button>
                <button class="btn btn-warning" onclick="runCodeTests()">
                    💻 Code Tests Only
                </button>
                <button class="btn btn-danger" onclick="clearResults()">
                    🗑️ Clear Results
                </button>
            </div>

            <div class="content">
                <div class="stats" id="stats" style="display: none">
                    <div class="stat-card stat-total">
                        <h3 id="stat-total">0</h3>
                        <p>Total Tests</p>
                    </div>
                    <div class="stat-card stat-pass">
                        <h3 id="stat-pass">0</h3>
                        <p>Passed</p>
                    </div>
                    <div class="stat-card stat-fail">
                        <h3 id="stat-fail">0</h3>
                        <p>Failed</p>
                    </div>
                    <div class="stat-card stat-warn">
                        <h3 id="stat-warn">0</h3>
                        <p>Warnings</p>
                    </div>
                </div>

                <div id="results"></div>
            </div>
        </div>

        <script>
            const API_URL = "https://7agty.com/api";
            const STORAGE_URL = "https://7agty.com/storage";

            let stats = {
                total: 0,
                passed: 0,
                failed: 0,
                warnings: 0,
            };

            // Sample image from the properties folder
            const SAMPLE_IMAGE = "2DmfwwHn6tuVbhdhEalwFNY7ld4uy5XwyUsiivgJ.png";

            async function runAllTests() {
                clearResults();
                showLoading();

                await runAPITests();
                await runCodeTests();
                await runStorageTests();

                hideLoading();
                updateStats();
                showSummary();
            }

            async function runAPITests() {
                addSection("🔌 API Endpoint Tests");

                // Test 1: Health Check
                await testAPI(
                    "API Health Check",
                    `${API_URL}/health`,
                    "GET",
                    null,
                    (data) => {
                        return data && data.status === "ok";
                    }
                );

                // Test 2: CSRF Cookie
                await testAPI(
                    "CSRF Cookie",
                    "https://7agty.com/sanctum/csrf-cookie",
                    "GET",
                    null,
                    () => true
                );

                // Test 3: Login
                const loginData = await testAPI(
                    "Login Endpoint",
                    `${API_URL}/login`,
                    "POST",
                    {
                        email: "test@example.com",
                        password: "password123",
                    },
                    null,
                    true
                );

                // Test 4: Register
                await testAPI(
                    "Register Endpoint",
                    `${API_URL}/register`,
                    "POST",
                    {
                        name: "Test User",
                        email: "newuser@example.com",
                        password: "password123",
                        password_confirmation: "password123",
                        phone: "1234567890",
                    },
                    null,
                    true
                );

                // Test 5: Governorates
                await testAPI(
                    "Get Governorates",
                    `${API_URL}/governorates`,
                    "GET",
                    null,
                    (data) => {
                        return Array.isArray(data);
                    }
                );

                // Test 6: Cities
                await testAPI(
                    "Get Cities",
                    `${API_URL}/cities?governorate_id=1`,
                    "GET",
                    null,
                    (data) => {
                        return Array.isArray(data);
                    }
                );

                // Test 7: Properties (Marketplace)
                await testAPI(
                    "Get Properties (Marketplace)",
                    `${API_URL}/properties`,
                    "GET",
                    null,
                    (data) => {
                        if (data && data.data && Array.isArray(data.data)) {
                            // Check for template literal issues in responses
                            const firstProperty = data.data[0];
                            if (firstProperty && firstProperty.images) {
                                const hasTemplateLiteralBug =
                                    firstProperty.images.some(
                                        (img) =>
                                            img.includes("${") ||
                                            img.includes("undefined")
                                    );
                                if (hasTemplateLiteralBug) {
                                    addWarning(
                                        "Template Literal Issue",
                                        "Property images contain ${} or undefined - check API response format",
                                        JSON.stringify(
                                            firstProperty.images,
                                            null,
                                            2
                                        )
                                    );
                                }

                                // Check for localhost URLs
                                const hasLocalhostURL =
                                    firstProperty.images.some(
                                        (img) =>
                                            img.includes("localhost") ||
                                            img.includes("127.0.0.1")
                                    );
                                if (hasLocalhostURL) {
                                    addError(
                                        "Localhost URL Detected",
                                        "Property images contain localhost URLs instead of production URLs",
                                        JSON.stringify(
                                            firstProperty.images,
                                            null,
                                            2
                                        )
                                    );
                                }
                            }
                            return true;
                        }
                        return false;
                    }
                );

                // Test 8: Featured Properties
                await testAPI(
                    "Get Featured Properties",
                    `${API_URL}/properties/featured`,
                    "GET",
                    null,
                    (data) => {
                        return Array.isArray(data);
                    }
                );

                // Test 9: Categories
                await testAPI(
                    "Get Categories",
                    `${API_URL}/categories`,
                    "GET",
                    null,
                    (data) => {
                        return (
                            Array.isArray(data) ||
                            (data && typeof data === "object")
                        );
                    }
                );

                // Test 10: Contact Form
                await testAPI(
                    "Contact Form Submission",
                    `${API_URL}/contact`,
                    "POST",
                    {
                        name: "Test User",
                        email: "test@example.com",
                        subject: "Test Subject",
                        message: "Test message",
                    },
                    null,
                    true
                );
            }

            async function runCodeTests() {
                addSection("💻 Code Quality Tests");

                // These tests check for common issues in the codebase
                await checkTemplateLiterals();
                await checkURLFormats();
                await checkCORSHeaders();
            }

            async function runStorageTests() {
                addSection("📁 Storage & File Tests");

                // Test storage URL accessibility
                await testStorageURL(
                    `Storage Image Access`,
                    `${STORAGE_URL}/properties/${SAMPLE_IMAGE}`
                );

                // Test direct Laravel storage
                await testStorageURL(
                    `Direct Laravel Storage`,
                    `https://7agty.com/laravel/public/storage/properties/${SAMPLE_IMAGE}`
                );
            }

            async function testAPI(
                name,
                url,
                method = "GET",
                body = null,
                validator = null,
                expectError = false
            ) {
                stats.total++;

                try {
                    const options = {
                        method: method,
                        headers: {
                            "Content-Type": "application/json",
                            Accept: "application/json",
                        },
                        credentials: "include",
                    };

                    if (body) {
                        options.body = JSON.stringify(body);
                    }

                    const response = await fetch(url, options);
                    const data = await response.json().catch(() => null);

                    if (expectError) {
                        // For login/register, we expect 401/422 errors if credentials are wrong
                        if (
                            response.status === 401 ||
                            response.status === 422
                        ) {
                            addSuccess(
                                name,
                                `Endpoint responding correctly (${response.status})`,
                                `URL: ${url}\nStatus: ${
                                    response.status
                                }\nResponse: ${JSON.stringify(data, null, 2)}`
                            );
                            stats.passed++;
                            return data;
                        }
                    }

                    if (!response.ok) {
                        addError(
                            name,
                            `HTTP ${response.status}: ${response.statusText}`,
                            `URL: ${url}\nResponse: ${JSON.stringify(
                                data,
                                null,
                                2
                            )}`
                        );
                        stats.failed++;
                        return null;
                    }

                    if (validator) {
                        const isValid = validator(data);
                        if (!isValid) {
                            addWarning(
                                name,
                                "Response validation failed",
                                `URL: ${url}\nResponse: ${JSON.stringify(
                                    data,
                                    null,
                                    2
                                )}`
                            );
                            stats.warnings++;
                            return data;
                        }
                    }

                    addSuccess(
                        name,
                        `Success (${response.status})`,
                        `URL: ${url}\nResponse: ${JSON.stringify(
                            data,
                            null,
                            2
                        ).substring(0, 500)}...`
                    );
                    stats.passed++;
                    return data;
                } catch (error) {
                    addError(
                        name,
                        error.message,
                        `URL: ${url}\nError: ${error.stack}`
                    );
                    stats.failed++;
                    return null;
                }
            }

            async function testStorageURL(name, url) {
                stats.total++;

                try {
                    const response = await fetch(url, { method: "HEAD" });

                    if (response.ok) {
                        addSuccess(
                            name,
                            `Image accessible (${response.status})`,
                            `URL: ${url}\nContent-Type: ${response.headers.get(
                                "content-type"
                            )}`
                        );
                        stats.passed++;
                    } else {
                        addError(
                            name,
                            `HTTP ${response.status}: ${response.statusText}`,
                            `URL: ${url}\nImage not accessible - check storage symlink and .htaccess routing`
                        );
                        stats.failed++;
                    }
                } catch (error) {
                    addError(
                        name,
                        `Connection Error: ${error.message}`,
                        `URL: ${url}\nPossible causes:\n- Storage symlink missing\n- .htaccess not routing /storage/* correctly\n- File permissions issue`
                    );
                    stats.failed++;
                }
            }

            async function checkTemplateLiterals() {
                stats.total++;

                // This simulates checking for template literal issues
                const issues = [];

                // Test the actual frontend by checking if API_URL is properly interpolated
                const testStr1 = `${API_URL}/test`;
                const testStr2 = "${API_URL}/test";

                if (testStr1 === testStr2) {
                    issues.push(
                        "Template literals not working - using single quotes instead of backticks"
                    );
                }

                if (testStr2.includes("${")) {
                    addWarning(
                        "Template Literal Syntax Check",
                        "Found potential template literal issues in code",
                        `Example: '\\${API_URL}' should be \`\\${API_URL}\``
                    );
                    stats.warnings++;
                } else {
                    addSuccess(
                        "Template Literal Syntax Check",
                        "All template literals using correct backtick syntax",
                        "No ${} found in single-quoted strings"
                    );
                    stats.passed++;
                }
            }

            async function checkURLFormats() {
                stats.total++;

                // Check if URLs are using production domain
                const productionDomain = "7agty.com";
                const localhostPatterns = [
                    "localhost",
                    "127.0.0.1",
                    "localhost:8000",
                ];

                if (API_URL.includes(productionDomain)) {
                    addSuccess(
                        "Production URL Check",
                        "Using production domain correctly",
                        `API_URL: ${API_URL}`
                    );
                    stats.passed++;
                } else if (
                    localhostPatterns.some((pattern) =>
                        API_URL.includes(pattern)
                    )
                ) {
                    addError(
                        "Localhost URL Detected",
                        "API_URL is pointing to localhost instead of production",
                        `Current: ${API_URL}\nShould be: https://7agty.com/api`
                    );
                    stats.failed++;
                } else {
                    addWarning(
                        "URL Format Check",
                        "API_URL format needs verification",
                        `API_URL: ${API_URL}`
                    );
                    stats.warnings++;
                }
            }

            async function checkCORSHeaders() {
                stats.total++;

                try {
                    const response = await fetch(`${API_URL}/health`, {
                        method: "OPTIONS",
                        headers: {
                            Origin: "https://7agty.com",
                            "Access-Control-Request-Method": "POST",
                        },
                    });

                    const corsHeader = response.headers.get(
                        "Access-Control-Allow-Origin"
                    );
                    const credentialsHeader = response.headers.get(
                        "Access-Control-Allow-Credentials"
                    );

                    if (corsHeader && credentialsHeader === "true") {
                        addSuccess(
                            "CORS Configuration",
                            "CORS headers configured correctly",
                            `Access-Control-Allow-Origin: ${corsHeader}\nAccess-Control-Allow-Credentials: ${credentialsHeader}`
                        );
                        stats.passed++;
                    } else {
                        addWarning(
                            "CORS Configuration",
                            "CORS headers may need adjustment",
                            `Access-Control-Allow-Origin: ${corsHeader}\nAccess-Control-Allow-Credentials: ${credentialsHeader}`
                        );
                        stats.warnings++;
                    }
                } catch (error) {
                    addError(
                        "CORS Configuration",
                        "Failed to check CORS headers",
                        error.message
                    );
                    stats.failed++;
                }
            }

            function addSection(title) {
                const section = document.createElement("div");
                section.className = "section";
                section.innerHTML = `<h2 class="section-title">${title}</h2>`;
                document.getElementById("results").appendChild(section);
            }

            function addSuccess(name, message, details = "") {
                addTestItem("success", name, message, details);
            }

            function addError(name, message, details = "") {
                addTestItem("error", name, message, details);
            }

            function addWarning(name, message, details = "") {
                addTestItem("warning", name, message, details);
            }

            function addTestItem(type, name, message, details = "") {
                const sections = document.querySelectorAll(".section");
                const lastSection = sections[sections.length - 1];

                const badgeClass =
                    type === "success"
                        ? "badge-success"
                        : type === "error"
                        ? "badge-error"
                        : "badge-warning";
                const badgeText =
                    type === "success"
                        ? "✓ PASS"
                        : type === "error"
                        ? "✗ FAIL"
                        : "⚠ WARN";

                const id = "details-" + Date.now() + Math.random();

                const item = document.createElement("div");
                item.className = `test-item ${type}`;
                item.innerHTML = `
                <div class="test-name">
                    <span>${name}</span>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="test-details">${message}</div>
                ${
                    details
                        ? `
                    <span class="toggle-details" onclick="toggleDetails('${id}')">Show Details ▼</span>
                    <div class="details-content" id="${id}">
                        <div class="code-block">${escapeHtml(details)}</div>
                    </div>
                `
                        : ""
                }
            `;

                lastSection.appendChild(item);
            }

            function toggleDetails(id) {
                const element = document.getElementById(id);
                element.classList.toggle("show");
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            function updateStats() {
                document.getElementById("stats").style.display = "grid";
                document.getElementById("stat-total").textContent = stats.total;
                document.getElementById("stat-pass").textContent = stats.passed;
                document.getElementById("stat-fail").textContent = stats.failed;
                document.getElementById("stat-warn").textContent =
                    stats.warnings;
            }

            function showLoading() {
                document.getElementById("results").innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Running comprehensive tests...</p>
                </div>
            `;
            }

            function hideLoading() {
                const loading = document.querySelector(".loading");
                if (loading) loading.remove();
            }

            function clearResults() {
                document.getElementById("results").innerHTML = "";
                document.getElementById("stats").style.display = "none";
                stats = { total: 0, passed: 0, failed: 0, warnings: 0 };
            }

            function showSummary() {
                addSection("📊 Test Summary");

                const passRate =
                    stats.total > 0
                        ? ((stats.passed / stats.total) * 100).toFixed(1)
                        : 0;

                let summaryType = "success";
                let summaryMessage = "🎉 All tests passed!";

                if (stats.failed > 0) {
                    summaryType = "error";
                    summaryMessage = `❌ ${stats.failed} test(s) failed - action required`;
                } else if (stats.warnings > 0) {
                    summaryType = "warning";
                    summaryMessage = `⚠️ ${stats.warnings} warning(s) - review recommended`;
                }

                addTestItem(
                    summaryType,
                    "Overall Result",
                    `${summaryMessage} (${passRate}% pass rate)`,
                    `Total Tests: ${stats.total}\nPassed: ${stats.passed}\nFailed: ${stats.failed}\nWarnings: ${stats.warnings}`
                );
            }

            // Auto-run on load
            window.addEventListener("load", () => {
                console.log("🔍 Comprehensive API Test Tool Loaded");
                console.log('Click "Run All Tests" to start testing');
            });
        </script>
    </body>
</html>
